<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Execute Command</title>
    <link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css">
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
    <style>
        code {
            background: rgba(255,255,255,0.1);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 11px;
        }
        details {
            margin-top: 4px;
        }
        summary {
            cursor: pointer;
            font-size: 12px;
        }
        ul {
            font-size: 11px;
            margin-top: 8px;
            padding-left: 20px;
        }
        li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <sdpi-item label="Command">
        <sdpi-textfield 
            setting="command" 
            placeholder='input /ma "Cure" <t>'>
        </sdpi-textfield>
    </sdpi-item>
    
    <sdpi-item label="">
        <details>
            <summary>Command Examples</summary>
            <ul>
                <li><code>input /ma "Cure" &lt;t&gt;</code> - Cast spell</li>
                <li><code>input /ja "Provoke" &lt;t&gt;</code> - Use ability</li>
                <li><code>input /ws "Savage Blade" &lt;t&gt;</code> - Weapon skill</li>
                <li><code>send Whitey input /ma "Cure IV" &lt;me&gt;</code> - Send to alt</li>
                <li><code>lua r gearswap</code> - Reload addon</li>
                <li><code>gs c toggle</code> - GearSwap command</li>
            </ul>
        </details>
    </sdpi-item>
</body>
</html>
