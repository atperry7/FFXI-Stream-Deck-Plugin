name: Build and Release Stream Deck Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: com.atperry7.ffxi-windower.sdPlugin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stream Deck CLI
        run: npm install -g @elgato/cli@latest

      - name: Install dependencies
        run: npm ci
        working-directory: com.atperry7.ffxi-windower.sdPlugin

      - name: Validate plugin
        run: streamdeck validate com.atperry7.ffxi-windower.sdPlugin

      - name: Build plugin package
        run: streamdeck pack com.atperry7.ffxi-windower.sdPlugin

      - name: Find built package
        id: find-package
        run: |
          $package = Get-ChildItem -Path "." -Filter "*.streamDeckPlugin" | Select-Object -First 1
          echo "PACKAGE_PATH=$($package.Name)" >> $env:GITHUB_OUTPUT
          echo "PACKAGE_NAME=$($package.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: ${{ steps.find-package.outputs.PACKAGE_PATH }}

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-package.outputs.PACKAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
