name: Build and Release Stream Deck Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stream Deck CLI
        run: npm install -g @elgato/cli@latest

      - name: Install dependencies
        run: npm ci

      - name: Validate plugin
        run: streamdeck validate com.atperry7.ffxi-windower.sdPlugin
        continue-on-error: true

      - name: Build plugin package
        run: |
          # Create the plugin directory structure expected by streamdeck pack
          mkdir -p build

          # Copy plugin files to the build directory with .sdPlugin suffix
          Copy-Item -Path "." -Destination "build/com.atperry7.ffxi-windower.sdPlugin" -Recurse -Force

          # Remove git and github files from the copy
          Remove-Item -Path "build/com.atperry7.ffxi-windower.sdPlugin/.git" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "build/com.atperry7.ffxi-windower.sdPlugin/.github" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "build/com.atperry7.ffxi-windower.sdPlugin/logs" -Recurse -Force -ErrorAction SilentlyContinue

          # Pack the plugin
          cd build
          streamdeck pack com.atperry7.ffxi-windower.sdPlugin
        shell: pwsh

      - name: Find built package
        id: find-package
        run: |
          $package = Get-ChildItem -Path "build" -Filter "*.streamDeckPlugin" | Select-Object -First 1
          echo "PACKAGE_PATH=build/$($package.Name)" >> $env:GITHUB_OUTPUT
          echo "PACKAGE_NAME=$($package.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: ${{ steps.find-package.outputs.PACKAGE_PATH }}

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-package.outputs.PACKAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
